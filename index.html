							<a id=sf_label href="" rel=lk><img height=35 src="images/logo.png" width=105
									rel="img"></a>

							<input class=searchint type=submit value="生活万事搜" rel="btn">
							<div class="ctrl">

									document.write('<label><input class=radio type=radio value="wikihow" CHECKED onChange=setCookie(\'wikihow\') name=search_select rad="wikihow">生活万事搜</label>'); document.write('<label><input class=radio type=radio value="baidu" name=search_select rad="baidu">百度</label>'); document.write('<label><input class=radio type=radio value="bing" onChange="setCookie(\'bing\')" name=search_select rad="bing">必应</label>'); document.write('<label><input class=radio type=radio value="sogou" onChange="setCookie(\'sogou\')" name=search_select rad="sogou">搜狗</label>'); document.write('<label><input class=radio type=radio value="yandex"  onChange="setCookie(\'yandex\')" name=search_select rad="yandex">Yandex</label>');document.write('<label><input class=radio type=radio value="google" name=search_select rad="google">google</label>');
